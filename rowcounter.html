<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Row Counter</h1>
    <label id="count">0</label><br>
    <div id="buttonCon">
        <button id="dec10" class="buttons">-10</button>
        <button id="decrease" class="buttons">-</button>
        <button id="reset" class="buttons">reset</button>
        <button id="increase" class="buttons">+</button>
        <button id="inc10" class="buttons">+10</button><br><br>
    </div> 
</div>
    <script src="script.js"></script>
</body>
</html>
